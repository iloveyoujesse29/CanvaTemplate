<style>
  :root{--pine:#1E3A34;--pine-soft:#2C4F47;--euc:#DCE7E0;--warm:#FBFAF7;
    --brass:#A9803A;--brass-soft:#C29A54;--ink:#33403B;--muted:#6A756F;}
  *{box-sizing:border-box;}
  .serif{font-family:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,serif;}
  .brd{overflow:hidden;position:relative;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;}
  .pill{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);
    border-radius:100px;padding:18px 34px;font-size:34px;color:#EAF1EC;font-weight:600;line-height:1;}
  .pill .d{width:14px;height:14px;border-radius:50%;background:var(--brass-soft);flex:0 0 auto;}
</style>

<!-- ETSY BIG BANNER 3360x840 -->
<section data-document-role="page" data-label="Shop banner" class="brd" style="width:3360px;height:840px;background:var(--pine);display:flex;align-items:center;padding:0 150px;gap:60px;">
  <div style="flex:1;">
    <div class="serif" style="font-weight:700;font-size:172px;line-height:1;color:#fff;letter-spacing:.005em;">The Solo <span style="color:var(--brass-soft);">Suite</span></div>
    <div style="display:flex;align-items:center;gap:32px;margin-top:40px;">
      <span style="width:120px;height:6px;background:var(--brass);display:inline-block;"></span>
      <span style="font-size:58px;letter-spacing:.02em;color:#CBD8D0;">Done-for-you templates for solo service providers</span>
    </div>
  </div>
  <div style="flex:0 0 auto;display:flex;flex-direction:column;gap:26px;align-items:flex-start;">
    <span class="pill"><span class="d"></span>Editable in Canva</span>
    <span class="pill"><span class="d"></span>Google Sheets + Excel</span>
    <span class="pill"><span class="d"></span>Instant download</span>
  </div>
</section>

<!-- ETSY SHOP ICON 500x500 (designed to read inside a circle crop) -->
<section data-document-role="page" data-label="Shop icon" class="brd" style="width:500px;height:500px;background:var(--pine);display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div class="serif" style="font-weight:700;font-size:236px;line-height:.9;color:var(--warm);letter-spacing:-.02em;">S<span style="color:var(--brass-soft);">S</span></div>
  <div style="font-size:30px;letter-spacing:.34em;text-transform:uppercase;color:var(--brass-soft);font-weight:700;margin-top:20px;">The Solo Suite</div>
</section>
